<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>교육뉴스 자동 모아보기</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;margin:0;background:#f5f7fb;color:#111827}
header{background:#1d4ed8;color:white;padding:28px 20px}
main{max-width:1050px;margin:0 auto;padding:20px}
h1{margin:0;font-size:30px}
.card{background:white;border:1px solid #e5e7eb;border-radius:16px;padding:16px;margin:12px 0;box-shadow:0 4px 18px rgba(0,0,0,.04)}
.news h2{font-size:18px;margin:0 0 8px}
.news a{color:#1d4ed8;text-decoration:none}
.news a:hover{text-decoration:underline}
.meta{font-size:13px;color:#6b7280;margin-bottom:8px}
.summary{font-size:14px;line-height:1.55;color:#374151}
button{border:0;background:#1d4ed8;color:white;border-radius:10px;padding:10px 14px;font-size:15px;cursor:pointer}
.status{font-size:14px;color:#6b7280;margin-top:8px}
</style>
</head>
<body>
<header>
  <h1>교육뉴스 자동 모아보기</h1>
  <p>교육 키워드가 포함된 국내 최신 뉴스를 자동으로 불러옵니다.</p>
</header>
<main>
  <div class="card">
    <button onclick="loadNews()">뉴스 새로고침</button>
    <div id="status" class="status">뉴스를 불러오는 중입니다...</div>
  </div>
  <div id="news"></div>
</main>

<script>
async function loadNews(){
  const status = document.getElementById('status');
  const news = document.getElementById('news');
  status.textContent = '뉴스를 불러오는 중입니다...';
  news.innerHTML = '';
  try{
    const res = await fetch('/api/news');
    if(!res.ok) throw new Error('API 오류');
    const data = await res.json();
    status.textContent = `총 ${data.items.length}건 · 마지막 업데이트: ${new Date().toLocaleString('ko-KR')}`;
    news.innerHTML = data.items.map(item => `
      <article class="card news">
        <h2><a href="${item.link}" target="_blank" rel="noopener">${item.title}</a></h2>
        <div class="meta">${item.source} · ${item.pubDate}</div>
        <div class="summary">${item.summary || ''}</div>
      </article>
    `).join('');
  }catch(e){
    status.textContent = '뉴스를 불러오지 못했습니다. 잠시 후 다시 새로고침해 주세요.';
  }
}
loadNews();
</script>
</body>
</html>
