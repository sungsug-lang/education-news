<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>교육 뉴스</title>
</head>
<body>
<h1>교육 뉴스</h1>
<div id="news"></div>

<script>
fetch('/api/news')
.then(res => res.json())
.then(data => {
  const el = document.getElementById('news');
  el.innerHTML = data.items.map(n =>
    `<p><a href="${n.link}" target="_blank">${n.title}</a></p>`
  ).join('');
});
</script>
</body>
</html>
